services:
  - type: web
    name: market-analyzer-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
      - key: OPENAI_API_KEY
        sync: false
